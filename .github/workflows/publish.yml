name: Release

on:
  release:
    types: [published]

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  bundles:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            arch: arm64
            platform: darwin
          - os: macos-latest
            arch: x64
            platform: darwin
          - os: ubuntu-latest
            arch: x64
            platform: linux
          - os: ubuntu-latest
            arch: arm64
            platform: linux

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Install target platform native deps
        run: |
          PKG="@opentui/core-${{ matrix.platform }}-${{ matrix.arch }}"
          OTUI_VER=$(bun -e "console.log(require('@opentui/core/package.json').version)")
          TARGET_DIR="node_modules/@opentui/core-${{ matrix.platform }}-${{ matrix.arch }}"
          if [ ! -d "$TARGET_DIR" ]; then
            mkdir -p "$TARGET_DIR"
            TARBALL=$(npm pack "${PKG}@${OTUI_VER}" 2>/dev/null | tail -1)
            tar xzf "$TARBALL" --strip-components=1 -C "$TARGET_DIR"
            rm -f "$TARBALL"
          fi

      - name: Build bundle
        run: bash scripts/bundle.sh ${{ matrix.arch }} ${{ matrix.platform }}

      - name: Upload to release
        run: |
          VERSION=$(bun -e "console.log(require('./package.json').version)")
          BUNDLE="soulforge-${VERSION}-${{ matrix.platform }}-${{ matrix.arch }}"
          for i in 1 2 3; do
            gh release upload "${{ github.event.release.tag_name }}" "dist/bundle/${BUNDLE}.tar.gz" --clobber && break
            echo "Upload attempt $i failed, retrying in 10s..."
            sleep 10
          done
        env:
          GH_TOKEN: ${{ github.token }}

  checksums:
    runs-on: ubuntu-latest
    needs: bundles
    steps:
      - uses: actions/checkout@v5

      - name: Download all release assets
        run: |
          gh release download "${{ github.event.release.tag_name }}" --dir assets --pattern '*.tar.gz'
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Generate SHA256SUMS
        run: |
          cd assets
          sha256sum *.tar.gz | tee SHA256SUMS.txt

      - name: Upload checksums to release
        run: |
          gh release upload "${{ github.event.release.tag_name }}" assets/SHA256SUMS.txt --clobber
        env:
          GH_TOKEN: ${{ github.token }}

  update-homebrew:
    runs-on: ubuntu-latest
    needs: checksums
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download checksums
        run: |
          gh release download "${{ github.event.release.tag_name }}" --dir assets --pattern 'SHA256SUMS.txt'
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Extract SHA256 per platform
        id: sha
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          for platform in darwin-arm64 darwin-x64 linux-x64 linux-arm64; do
            SHA=$(grep "soulforge-${VERSION}-${platform}.tar.gz" assets/SHA256SUMS.txt | awk '{print $1}')
            KEY=$(echo "$platform" | tr '-' '_')
            echo "${KEY}=${SHA}" >> "$GITHUB_OUTPUT"
            echo "  ${platform}: ${SHA}"
          done

      - name: Checkout homebrew-tap
        uses: actions/checkout@v5
        with:
          repository: ProxySoul/homebrew-tap
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: homebrew-tap

      - name: Generate formula
        env:
          VERSION: ${{ steps.version.outputs.version }}
          SHA_DARWIN_ARM64: ${{ steps.sha.outputs.darwin_arm64 }}
          SHA_DARWIN_X64: ${{ steps.sha.outputs.darwin_x64 }}
          SHA_LINUX_X64: ${{ steps.sha.outputs.linux_x64 }}
          SHA_LINUX_ARM64: ${{ steps.sha.outputs.linux_arm64 }}
        run: |
          mkdir -p homebrew-tap/Formula
          cat > homebrew-tap/Formula/soulforge.rb << FORMULA
          # typed: false
          # frozen_string_literal: true

          class Soulforge < Formula
            desc "Graph-powered code intelligence"
            homepage "https://github.com/ProxySoul/soulforge"
            version "${VERSION}"
            license "BUSL-1.1"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/ProxySoul/soulforge/releases/download/v#{version}/soulforge-#{version}-darwin-arm64.tar.gz"
                sha256 "${SHA_DARWIN_ARM64}"
              end
              if Hardware::CPU.intel?
                url "https://github.com/ProxySoul/soulforge/releases/download/v#{version}/soulforge-#{version}-darwin-x64.tar.gz"
                sha256 "${SHA_DARWIN_X64}"
              end
            end

            on_linux do
              if Hardware::CPU.arm? && Hardware::CPU.is_64_bit?
                url "https://github.com/ProxySoul/soulforge/releases/download/v#{version}/soulforge-#{version}-linux-arm64.tar.gz"
                sha256 "${SHA_LINUX_ARM64}"
              end
              if Hardware::CPU.intel?
                url "https://github.com/ProxySoul/soulforge/releases/download/v#{version}/soulforge-#{version}-linux-x64.tar.gz"
                sha256 "${SHA_LINUX_X64}"
              end
            end

            def install
              libexec.install Dir["*"]

              # Gzip ALL Mach-O files so Homebrew's keg_relocate can't detect them.
              # It scans by magic bytes, not extension — renaming alone doesn't work.
              system "gzip", libexec/"soulforge"
              Dir.glob(libexec/"deps/native/**/*.{node,dylib,so}").each do |f|
                system "gzip", f
              end

              (bin/"soulforge").write <<~SH
                #!/bin/bash
                exec "\$HOME/.soulforge/bin/soulforge" "\$@"
              SH
              (bin/"sf").write <<~SH
                #!/bin/bash
                exec "\$HOME/.soulforge/bin/soulforge" "\$@"
              SH
              chmod 0755, bin/"soulforge"
              chmod 0755, bin/"sf"
            end

            def post_install
              system "gunzip", libexec/"soulforge.gz" if File.exist?(libexec/"soulforge.gz")
              Dir.glob(libexec/"deps/native/**/*.gz").each { |f| system "gunzip", f }
              system "chmod", "+x", libexec/"soulforge"

              # Use inline bash instead of Ruby file ops or install.sh —
              # both fail silently under Homebrew's post_install context.
              system "bash", "-c", <<~SH
                set -euo pipefail
                SF="\$HOME/.soulforge"
                BIN="\$SF/bin"
                SRC="#{libexec}"

                rm -rf "\$SF/bin" "\$SF/installs" "\$SF/wasm" "\$SF/workers" "\$SF/native" "\$SF/opentui-assets" "\$SF/init.lua" 2>/dev/null || true
                mkdir -p "\$BIN"

                cp "\$SRC/soulforge" "\$BIN/soulforge"
                chmod +x "\$BIN/soulforge"
                ln -sf "\$BIN/soulforge" "\$BIN/sf"

                for tool in rg fd lazygit cli-proxy-api; do
                  cp "\$SRC/deps/\$tool" "\$BIN/\$tool"
                  chmod +x "\$BIN/\$tool"
                done

                mkdir -p "\$SF/installs"
                cp -r "\$SRC/deps/nvim" "\$SF/installs/nvim-bundled"
                ln -sf "\$SF/installs/nvim-bundled/bin/nvim" "\$BIN/nvim"

                mkdir -p "\$SF/wasm" "\$SF/workers"
                cp "\$SRC/deps/wasm/"*.wasm "\$SF/wasm/"
                cp "\$SRC/deps/workers/"*.js "\$SF/workers/"
                [ -d "\$SRC/deps/native" ] && cp -r "\$SRC/deps/native" "\$SF/native"
                rm -rf "\$SF/opentui-assets"
                cp -r "\$SRC/deps/opentui-assets" "\$SF/opentui-assets"
                cp "\$SRC/deps/init.lua" "\$SF/init.lua"

                FONT_DIR="\$HOME/Library/Fonts"
                [ "$(uname)" != "Darwin" ] && FONT_DIR="\$HOME/.local/share/fonts"
                mkdir -p "\$FONT_DIR"
                cp "\$SRC/deps/nerd-fonts/"*.ttf "\$FONT_DIR/" 2>/dev/null || true

                [ "$(uname)" = "Darwin" ] && xattr -cr "\$SF" 2>/dev/null || true

                [ ! -f "\$SF/config.json" ] && echo '{"nerdFont":true}' > "\$SF/config.json"
              SH
            end

            def caveats
              <<~EOS
                SoulForge installed to ~/.soulforge/
                Run 'soulforge' or 'sf' to start.
              EOS
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/soulforge --version")
            end
          end
          FORMULA

      - name: Commit and push
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/soulforge.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "soulforge ${{ steps.version.outputs.version }}"
          git push

  npm-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Publish to npm
        run: npm publish || echo "Version already published, skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
